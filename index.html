<!DOCTYPE html>
<html>
    <head>
        <title>ping-pong advanced 
        </title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <div id="game">
            <h1 id="score">0 - 0</h1>

            <img id="left-bar" src="left_bar.png" alt="left bar">
            <img id="right-bar" src="right_bar.png" alt="right bar">
            <img id="ball" src="ball.png" alt="ball">

        </div>

        <div id ="ui-box">
            <span id="hit-1">1: <img src="straight.png" alt="Hit-Up" class="Hit-Up"></span>
            <span id="hit-2">2: <img src="straight.png" alt="Hit-Straight" class="Hit-Straight"></span>
            <span id="hit-3">3: <img src="straight.png" alt="Hit-Down" class="Hit-Down"> </span>

            <div id="cooldown-tracker">READY</div>
        </div>

        <script src="script.js"></script>

    </body>
</html>
